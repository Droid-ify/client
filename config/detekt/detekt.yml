config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

#### ktlint-based formatting ruleset (detekt-formatting) ####
# Drives the `detektFormat` auto-correct task. NOTE: Flow.kt / Number.kt are
# excluded at the task level (build.gradle.kts) because the bundled ktlint
# parser NPEs on -Xcontext-parameters.
formatting:
  active: true
  autoCorrect: true
  android: true
  Indentation:
    active: true
    indentSize: 4
  MaximumLineLength:
    active: true
    maxLineLength: 120
  FinalNewline:
    active: true
  TrailingCommaOnCallSite:
    active: true
    useTrailingCommaOnCallSite: true
  TrailingCommaOnDeclarationSite:
    active: true
    useTrailingCommaOnDeclarationSite: true
  # Wildcard imports are used across the codebase; don't fight it.
  NoWildcardImports:
    active: false

#### Jetpack Compose ruleset (io.nlopez.compose.rules) ####
Compose:
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  CompositionLocalAllowlist:
    active: true
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  ContentSlotReused:
    active: true
  ContentTrailingLambda:
    active: true
  DefaultsVisibility:
    active: true
  LambdaParameterEventTrailing:
    active: true
  LambdaParameterInRestartableEffect:
    active: true
  Material2:
    active: false
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParam:
    active: true
  ParameterNaming:
    active: true
  PreviewAnnotationNaming:
    active: true
  PreviewNaming:
    active: false
  PreviewPublic:
    active: true
  RememberContentMissing:
    active: true
  RememberMissing:
    active: true
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true

complexity:
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
    ignoreAnnotatedParameter: ['Composable']
  TooManyFunctions:
    active: true
    thresholdInClasses: 20
    thresholdInFiles: 20

style:
  MagicNumber:
    active: false
  ReturnCount:
    active: false
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']
  MaxLineLength:
    active: true
    maxLineLength: 120

naming:
  MatchingDeclarationName:
    active: false
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    active: true
